spring.application.name=personal-project-web2026
server.port=${PORT:8080}
server.forward-headers-strategy=framework

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/finance_db}
spring.datasource.username=${DATABASE_USERNAME:finance_user}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Shanghai
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true

spring.jackson.time-zone=Asia/Shanghai
spring.jackson.default-property-inclusion=non_null

spring.threads.virtual.enabled=true
spring.main.keep-alive=true



spring.ai.anthropic.base-url=${ANTHROPIC_BASE_URL:https://moark.com/anthropic}
spring.ai.anthropic.api-key=${ANTHROPIC_AUTH_TOKEN:local-placeholder}
spring.ai.anthropic.chat.options.model=${ANTHROPIC_MODEL:DeepSeek-V4-Flash}
spring.ai.model.chat=anthropic
spring.ai.anthropic.chat.options.max-tokens=${ANTHROPIC_MAX_TOKENS:4096}
spring.ai.anthropic.chat.options.temperature=${ANTHROPIC_TEMPERATURE:0.2}

spring.ai.retry.max-attempts=3
spring.ai.retry.backoff.initial-interval=1s
spring.ai.retry.backoff.multiplier=2
spring.ai.retry.backoff.max-interval=5s

app.ai.small-fast-model=${ANTHROPIC_SMALL_FAST_MODEL:GLM-4.7-Flash}

app.security.jwt.secret=${JWT_SECRET:financial-advisor-jwt-secret-2026-at-least-32-characters}
app.security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:7200}

app.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}

spring.mvc.async.request-timeout=120000

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB

logging.level.root=INFO
logging.level.cs.sbs.web.personalprojectweb2026=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN